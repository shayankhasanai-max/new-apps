<!DOCTYPE html>
<html>
<head>
  <title>My App Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
      z-index: 10;
    }

    h1 { margin: 0; font-size: 24px; }

    .search-box { margin-top: 10px; }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }

    /* 🔥 Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      margin-top: 10px;
      gap: 10px;
    }

    .tab-btn {
      padding: 8px 15px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #22c55e;
    }

    .container {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: rgba(30, 41, 59, 0.7);
      border-radius: 20px;
      padding: 15px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card img {
      width: 70px;
      border-radius: 15px;
    }

    .title { font-size: 18px; margin: 10px 0 5px; }

    .desc {
      font-size: 13px;
      color: #cbd5f5;
    }

    .download-btn {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>📱 My App Store</h1>

  <!-- 🔥 Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('apps')">Apps</button>
    <button class="tab-btn" onclick="switchTab('templates')">Templates</button>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search...">
  </div>
</header>

<div class="container" id="apps"></div>

<script>
let appsData = [];
let templateData = [];
let currentTab = "apps";

fetch("apps.json")
.then(res => res.json())
.then(data => {
  appsData = data.apps;
  templateData = data.templates;
  displayApps(appsData);
});

function displayApps(list){
  const container = document.getElementById("apps");
  container.innerHTML = "";

  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.image}">
      <div class="title">${item.name}</div>
      <div class="desc">${item.description}</div>
      <a href="${item.link}">
        <button class="download-btn">
          ${currentTab === "apps" ? "Download" : "View"}
        </button>
      </a>
    `;

    container.appendChild(card);
  });
}

// 🔁 Switch Tabs
function switchTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tab-btn").forEach(btn =>
    btn.classList.remove("active")
  );

  event.target.classList.add("active");

  if(tab === "apps"){
    displayApps(appsData);
  } else {
    displayApps(templateData);
  }
}

// 🔍 Search
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();

  const source = currentTab === "apps" ? appsData : templateData;

  const filtered = source.filter(item =>
    item.name.toLowerCase().includes(value)
  );

  displayApps(filtered);
});
</script>

</body>
</html>
